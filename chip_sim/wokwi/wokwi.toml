# Wokwi project config — experimental chip SIL (not product paper/BT gate).
# Docs: https://docs.espressif.com/projects/esp-idf/zh_CN/latest/esp32s3/third-party-tools/wokwi.html
#      https://docs.wokwi.com/vscode/project-config
#
# After building Grbl_Esp32 (PlatformIO release), either:
#   - set absolute paths below, or
#   - run: python ../run_wokwi_smoke.py  (rewrites paths from GRBL_ROOT)
#
# Default relative placeholders assume you copy/link firmware next to this file
# or override via run_wokwi_smoke.py.

[wokwi]
version = 1
# Prefer absolute paths generated by run_wokwi_smoke.py
firmware = 'firmware.bin'
elf = 'firmware.elf'
# gdbServerPort = 3333
rfc2217ServerPort = 4000
