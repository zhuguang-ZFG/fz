# R22/R32: host SIL on CI (no board).
# Windows: vendored grblHAL_sim.exe | Linux: build from grblHAL/Simulator (R32)
name: host-sil

env:
  GRBL_ROOT: ${{ github.workspace }}/product-firmware

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      run_standard:
        description: Run agent_gate --profile standard (slower, thorough)
        type: boolean
        default: false
      run_linux_quick:
        description: Optional Linux build+gate (R32 parked; not default)
        type: boolean
        default: false
      run_wokwi_startup:
        description: Build test_drive.h and run Wokwi cloud ESP32 startup smoke
        type: boolean
        default: false

jobs:
  # R28: on weekly schedule only run standard (avoid paying for quick+standard).
  # push / PR / manual dispatch always run quick.
  agent-gate-quick:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout product firmware
        uses: actions/checkout@v4
        with:
          repository: zhuguang-ZFG/Grbl_Esp32
          ref: Branch_736afa70
          path: product-firmware

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP SDK
        run: python -m pip install -r requirements-mcp.txt

      - name: Preflight sim binary
        shell: pwsh
        run: |
          $sim = "vendor/grblhal_sim/bin/grblHAL_sim.exe"
          if (-not (Test-Path $sim)) {
            Write-Error "missing $sim — vendor binary required for CI"
            exit 2
          }
          Get-Item $sim | Format-List Name, Length

      - name: validate protocol JSON cases (R33, no sim)
        shell: pwsh
        run: |
          python protocol_sim/validate_cases.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: agent_gate quick (shared sim + integrity + protocol)
        shell: pwsh
        run: |
          python scripts/agent_gate.py --profile quick
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-gate-quick
          path: |
            results/agent_gate_last.json
            results/agent_observe_last.md
            results/agent_observe_last.json
            results/triage_last.md
            results/sim_session.json
            protocol_sim/results/last_report.json
            protocol_sim/results/golden_last.json
            protocol_sim/results/integrity_inject_last.json
            protocol_sim/results/case_schema_last.json
            protocol_sim/results/soft_divergence.json
            native_sim/results/last_report.json
            native_sim/results/last_fuzz_report.json
            native_sim/results/coverage_summary.json
            hardware_sim/results/machine_pin_erc.json
            hardware_sim/results/machine_pin_mutations.json
            results/wokwi/wokwi_smoke_report.json
            results/wokwi/serial.log
            xiaozhi_sim/results/protocol_campaign.json
            xiaozhi_sim/results/firmware_contract.json
            results/qwen_gate_last.json
          if-no-files-found: warn

  # R32 (parked): Linux host SIL — opt-in only (low ROI vs Windows vendored sim).
  # Enable via workflow_dispatch → run_linux_quick, not on every push/PR.
  agent-gate-quick-linux:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_linux_quick == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout product firmware
        uses: actions/checkout@v4
        with:
          repository: zhuguang-ZFG/Grbl_Esp32
          ref: Branch_736afa70
          path: product-firmware

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP SDK
        run: python -m pip install -r requirements-mcp.txt

      - name: Build grblHAL_sim (Linux)
        run: bash scripts/build_grblhal_sim.sh

      - name: validate protocol JSON cases
        run: python protocol_sim/validate_cases.py

      - name: agent_gate quick
        run: |
          export GRBLHAL_SIM="${GITHUB_WORKSPACE}/vendor/grblhal_sim/bin/grblHAL_sim"
          test -x "$GRBLHAL_SIM"
          python scripts/agent_gate.py --profile quick

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-gate-quick-linux
          path: |
            results/agent_gate_last.json
            results/sim_session.json
            protocol_sim/results/last_report.json
            protocol_sim/results/golden_last.json
            protocol_sim/results/integrity_inject_last.json
            protocol_sim/results/case_schema_last.json
            native_sim/results/last_report.json
            native_sim/results/last_fuzz_report.json
            native_sim/results/coverage_summary.json
            hardware_sim/results/machine_pin_erc.json
            hardware_sim/results/machine_pin_mutations.json
            results/wokwi/wokwi_smoke_report.json
            results/wokwi/serial.log
            xiaozhi_sim/results/protocol_campaign.json
            xiaozhi_sim/results/firmware_contract.json
            results/qwen_gate_last.json
          if-no-files-found: warn

  agent-gate-standard:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_standard == 'true') }}
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout product firmware
        uses: actions/checkout@v4
        with:
          repository: zhuguang-ZFG/Grbl_Esp32
          ref: Branch_736afa70
          path: product-firmware

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP SDK
        run: python -m pip install -r requirements-mcp.txt

      - name: Preflight sim binary
        shell: pwsh
        run: |
          $sim = "vendor/grblhal_sim/bin/grblHAL_sim.exe"
          if (-not (Test-Path $sim)) {
            Write-Error "missing $sim — vendor binary required for CI"
            exit 2
          }
          Get-Item $sim | Format-List Name, Length

      - name: agent_gate standard (protocol + hardware_sim)
        shell: pwsh
        run: |
          python scripts/agent_gate.py --profile standard
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-gate-standard
          path: |
            results/agent_gate_last.json
            results/agent_observe_last.md
            results/agent_observe_last.json
            results/triage_last.md
            results/sim_session.json
            protocol_sim/results/last_report.json
            protocol_sim/results/golden_last.json
            protocol_sim/results/integrity_inject_last.json
            protocol_sim/results/soft_divergence.json
            hardware_sim/results/last_hw_report.json
            native_sim/results/last_report.json
            native_sim/results/last_fuzz_report.json
            native_sim/results/coverage_summary.json
            hardware_sim/results/machine_pin_erc.json
            hardware_sim/results/machine_pin_mutations.json
            results/wokwi/wokwi_smoke_report.json
            results/wokwi/serial.log
            xiaozhi_sim/results/protocol_campaign.json
            xiaozhi_sim/results/firmware_contract.json
            results/qwen_gate_last.json
          if-no-files-found: warn

  wokwi-startup:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_wokwi_startup == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout product firmware
        uses: actions/checkout@v4
        with:
          repository: zhuguang-ZFG/Grbl_Esp32
          ref: Branch_736afa70
          path: product-firmware

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install platformio

      - name: Install Wokwi CLI
        shell: pwsh
        run: |
          if (-not $env:WOKWI_CLI_TOKEN) { throw 'GitHub secret WOKWI_CLI_TOKEN is required' }
          iwr https://wokwi.com/ci/install.ps1 -useb | iex

      - name: Build safe test_drive firmware
        shell: pwsh
        working-directory: product-firmware
        run: |
          $env:PLATFORMIO_BUILD_FLAGS='-DMACHINE_FILENAME=test_drive.h'
          pio run -e release

      - name: Wokwi ESP32 startup gate
        shell: pwsh
        run: |
          python chip_sim/run_wokwi_smoke.py --grbl-root product-firmware --timeout-ms 30000 --expect-text Grbl --require
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Wokwi startup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-esp32-startup
          path: |
            results/wokwi/wokwi_smoke_report.json
            results/wokwi/serial.log
            results/wokwi/wokwi.toml
            results/wokwi/diagram.json
          if-no-files-found: warn
