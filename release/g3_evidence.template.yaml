# G3 / G3b product HIL evidence (fill and pass to release_gate --g3-evidence)
# Maps Grbl_Esp32 docs/ACCEPTANCE_CHECKLIST.md + community test_drive smoke.
# result: pass | fail | skip | na
# skip/na require note; fail blocks ship unless waived in release scope.

version: "product-YYYYMMDD"
grbl_git_sha: ""
operator: ""
date: ""          # YYYY-MM-DD
round: 1          # pre-release design: prefer 2 rounds
board: "esp32dev"
machine: "custom_3axis_hr4988"  # or test_drive
firmware_banner: ""             # paste $I or boot [MSG:...] line
serial_port: ""                 # e.g. COM7

items:
  # --- G3a general / test_drive ---
  - id: g3a.flash
    title: "Flash/upload succeeds"
    result: pass
    note: ""
    evidence: ""
  - id: g3a.boot
    title: "Serial 115200 boot banner / machine name"
    result: pass
    note: ""
    evidence: ""   # R36: prefer results/hil_logs/*_g3a_*.log path after hil_to_gate --port
