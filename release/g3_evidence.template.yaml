    title: "$I or $$ responds"
    result: pass
    note: ""
    evidence: ""
  - id: g3a.motion
    title: "$X + short G0/G1 ok, no unexpected Alarm"
    result: pass
    note: ""
    evidence: ""
  - id: g3a.reset
    title: "Ctrl-X soft reset recovers"
    result: pass
    note: ""
    evidence: ""

